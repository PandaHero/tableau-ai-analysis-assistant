<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Tableau AI Assistant - 连接测试</h1>
    
    <div id="frontend-status" class="status">
        ✓ 前端服务器正常运行
    </div>
    
    <div id="backend-status" class="status">
        正在测试后端连接...
    </div>
    
    <div id="tableau-status" class="status">
        正在检查 Tableau Extensions API...
    </div>
    
    <button onclick="testBackend()">重新测试后端</button>
    <button onclick="testTableau()">重新测试 Tableau API</button>
    
    <h2>测试详情</h2>
    <pre id="details"></pre>
    
    <script>
        const details = document.getElementById('details');
        
        function log(message) {
            details.textContent += message + '\n';
            console.log(message);
        }
        
        async function testBackend() {
            const statusDiv = document.getElementById('backend-status');
            statusDiv.textContent = '正在测试后端连接...';
            statusDiv.className = 'status';
            
            try {
                log('测试后端 /health 端点...');
                const response = await fetch('https://localhost:5000/health');
                const data = await response.json();
                
                log('后端响应: ' + JSON.stringify(data, null, 2));
                
                if (data.status === 'ok') {
                    statusDiv.textContent = '✓ 后端连接正常';
                    statusDiv.className = 'status success';
                } else {
                    statusDiv.textContent = '✗ 后端状态异常';
                    statusDiv.className = 'status error';
                }
            } catch (error) {
                log('后端连接失败: ' + error.message);
                statusDiv.textContent = '✗ 后端连接失败: ' + error.message;
                statusDiv.className = 'status error';
            }
        }
        
        function testTableau() {
            const statusDiv = document.getElementById('tableau-status');
            
            if (window.tableau && window.tableau.extensions) {
                log('Tableau Extensions API 已加载');
                statusDiv.textContent = '✓ Tableau Extensions API 已加载';
                statusDiv.className = 'status success';
                
                log('尝试初始化...');
                window.tableau.extensions.initializeAsync()
                    .then(() => {
                        log('Tableau Extensions API 初始化成功');
                        const dashboard = window.tableau.extensions.dashboardContent.dashboard;
                        log('Dashboard 名称: ' + dashboard.name);
                        statusDiv.textContent = '✓ Tableau Extensions API 初始化成功';
                    })
                    .catch(error => {
                        log('Tableau Extensions API 初始化失败: ' + error.message);
                        statusDiv.textContent = '✗ Tableau Extensions API 初始化失败';
                        statusDiv.className = 'status error';
                    });
            } else {
                log('Tableau Extensions API 未加载（这是正常的，如果不在 Tableau 环境中）');
                statusDiv.textContent = '⚠ Tableau Extensions API 未加载（不在 Tableau 环境中）';
                statusDiv.className = 'status';
            }
        }
        
        // 页面加载时自动测试
        window.addEventListener('load', () => {
            log('=== 开始连接测试 ===');
            log('当前 URL: ' + window.location.href);
            log('User Agent: ' + navigator.userAgent);
            log('');
            
            testBackend();
            testTableau();
        });
    </script>
</body>
</html>
