# ============================================================
# ModelManager 配置文件
# ============================================================

# LLM 模型配置
llm_models:
  # DeepSeek Chat（非思考模式）
  - id: "deepseek-chat"
    name: "DeepSeek Chat V3.2"
    model_type: "llm"
    provider: "deepseek"
    api_base: "https://api.deepseek.com"
    model_name: "deepseek-chat"
    api_key: "sk-9da1f26d50e1406394063aaa795421f0"
    openai_compatible: true
    temperature: 0.7
    max_tokens: 4096
    supports_streaming: true
    supports_json_mode: true
    is_reasoning_model: false
    suitable_tasks:
      - "semantic_parsing"
      - "field_mapping"
      - "dimension_hierarchy"
      - "insight_generation"
    priority: 10
    is_default: true
    status: "active"
  
  # DeepSeek Reasoner（思考模式）
  - id: "deepseek-reasoner"
    name: "DeepSeek Reasoner V3.2"
    model_type: "llm"
    provider: "deepseek"
    api_base: "https://api.deepseek.com"
    model_name: "deepseek-reasoner"
    api_key: "sk-9da1f26d50e1406394063aaa795421f0"
    openai_compatible: true
    temperature: 0.7
    max_tokens: 8192
    supports_streaming: true
    is_reasoning_model: true
    suitable_tasks:
      - "reasoning"
      - "insight_generation"
    priority: 15
    status: "active"

# Embedding 模型配置
embedding_models:
  # 智谱 AI Embedding
  - id: "zhipu-embedding"
    name: "Zhipu AI Embedding-2"
    model_type: "embedding"
    provider: "zhipu"
    api_base: "https://open.bigmodel.cn/api/paas/v4"
    model_name: "embedding-2"
    api_key: "b418bbdd992949e092f41df890e08f40.tDfChKbpqsZSSFx5"
    dimensions: 1024
    max_input_tokens: 512
    is_default: true
    status: "active"

# 全局配置
global:
  default_timeout: 120
  verify_ssl: true
  log_level: "INFO"
  enable_persistence: false
