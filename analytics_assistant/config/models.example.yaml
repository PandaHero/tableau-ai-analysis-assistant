# ============================================================
# ModelManager 配置文件示例
# 复制此文件为 models.yaml 并根据你的环境修改
# ============================================================

# LLM 模型配置
llm_models:
  # DeepSeek Chat（非思考模式）
  - id: "deepseek-chat"
    name: "DeepSeek Chat V3.2"
    model_type: "llm"
    provider: "deepseek"
    api_base: "https://api.deepseek.com"
    model_name: "deepseek-chat"
    api_key: "${DEEPSEEK_API_KEY}"  # 从环境变量读取
    openai_compatible: true
    temperature: 0.7
    max_tokens: 4096
    supports_streaming: true
    supports_json_mode: true
    is_reasoning_model: false
    suitable_tasks:
      - "semantic_parsing"
      - "field_mapping"
      - "dimension_hierarchy"
      - "insight_generation"
    priority: 10
    is_default: true
    status: "active"
  
  # DeepSeek Reasoner（思考模式）
  - id: "deepseek-reasoner"
    name: "DeepSeek Reasoner V3.2"
    model_type: "llm"
    provider: "deepseek"
    api_base: "https://api.deepseek.com"
    model_name: "deepseek-reasoner"
    api_key: "${DEEPSEEK_API_KEY}"
    openai_compatible: true
    temperature: 0.7
    max_tokens: 8192
    supports_streaming: true
    is_reasoning_model: true  # 推理模型
    suitable_tasks:
      - "reasoning"
      - "insight_generation"
    priority: 15
    status: "active"
  
  # 本地 Qwen3 模型
  - id: "qwen3-local"
    name: "Qwen3 本地"
    model_type: "llm"
    provider: "local"
    api_base: "${LLM_API_BASE:-http://localhost:8000/v1}"
    model_name: "${LLM_MODEL_NAME:-qwen3}"
    api_key: "${LLM_API_KEY:-EMPTY}"
    openai_compatible: true
    temperature: 0.7
    max_tokens: 4096
    supports_streaming: true
    supports_json_mode: true
    suitable_tasks:
      - "semantic_parsing"
      - "field_mapping"
    priority: 5
    status: "active"
  
  # Azure OpenAI（可选）
  - id: "azure-gpt4"
    name: "Azure GPT-4"
    model_type: "llm"
    provider: "azure"
    api_base: "${AZURE_OPENAI_ENDPOINT}"
    model_name: "${AZURE_OPENAI_DEPLOYMENT_NAME}"
    api_key: "${AZURE_OPENAI_API_KEY}"
    openai_compatible: false
    extra_body:
      api_version: "2024-02-15-preview"
    suitable_tasks:
      - "semantic_parsing"
      - "insight_generation"
    priority: 8
    status: "inactive"  # 默认禁用

# Embedding 模型配置
embedding_models:
  # 智谱 AI Embedding
  - id: "zhipu-embedding"
    name: "Zhipu AI Embedding-2"
    model_type: "embedding"
    provider: "zhipu"
    api_base: "https://open.bigmodel.cn/api/paas/v4"
    model_name: "embedding-2"
    api_key: "${ZHIPUAI_API_KEY}"
    dimensions: 1024
    max_input_tokens: 512
    is_default: true
    status: "active"
  
  # OpenAI Embedding
  - id: "openai-embedding"
    name: "OpenAI Embedding"
    model_type: "embedding"
    provider: "openai"
    api_base: "https://api.openai.com/v1"
    model_name: "text-embedding-3-small"
    api_key: "${OPENAI_API_KEY}"
    openai_compatible: true
    suitable_tasks:
      - "embedding"
    priority: 5
    status: "inactive"  # 默认禁用
  
  # 本地 BGE Embedding
  - id: "bge-local"
    name: "BGE Embedding 本地"
    model_type: "embedding"
    provider: "local"
    api_base: "${EMBEDDING_API_BASE:-http://localhost:8000/v1}"
    model_name: "bge-large-zh-v1.5"
    api_key: "EMPTY"
    openai_compatible: true
    suitable_tasks:
      - "embedding"
    priority: 3
    status: "inactive"

# 全局配置
global:
  # 默认超时时间（秒）
  default_timeout: 120
  
  # 是否验证 SSL 证书
  verify_ssl: true
  
  # 日志级别
  log_level: "INFO"
  
  # 是否启用模型配置持久化
  enable_persistence: false
  
  # 持久化存储路径（使用 LangGraph SqliteStore）
  persistence_path: "data/model_configs.db"
