[pytest]
# Pytest配置文件

# 设置asyncio fixture的默认loop scope
asyncio_default_fixture_loop_scope = function

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers

# 标记定义
markers =
    asyncio: 标记异步测试
    slow: 标记慢速测试
    integration: 标记集成测试
