# Pytest 配置文件

[pytest]
# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试标记
markers =
    smoke: 冒烟测试（最核心功能）
    critical: 关键功能测试
    core: 核心功能测试
    integration: 集成测试
    performance: 性能测试
    pbt: 属性测试（Property-Based Testing）
    slow: 慢速测试
    e2e: 端到端测试
    api: API 测试
    asyncio: 异步测试

# 并行运行测试（使用 pytest-xdist）
# 注释掉，因为需要先安装 pytest-xdist
# addopts = -n auto --dist loadscope

# 超时设置（需要 pytest-timeout）
# timeout = 300  # 单个测试最多 5 分钟

# 异步测试配置（需要 pytest-asyncio）
asyncio_mode = auto

# 日志设置
log_cli = true
log_cli_level = INFO
log_file = analytics_assistant/tests/test_outputs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 输出设置
console_output_style = progress
cache_dir = analytics_assistant/tests/test_outputs/.pytest_cache

# 覆盖率设置（需要 pytest-cov）
# addopts = --cov=analytics_assistant/src --cov-report=html --cov-report=term

# 测试目录
testpaths = analytics_assistant/tests

# 最小 Python 版本
minversion = 3.12
