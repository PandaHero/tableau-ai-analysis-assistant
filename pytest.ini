[pytest]
# Pytest配置文件

# 设置asyncio fixture的默认loop scope
asyncio_default_fixture_loop_scope = function

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers

# 标记定义
markers =
    asyncio: 标记异步测试
    slow: 标记慢速测试
    integration: 标记集成测试

# 过滤第三方库的警告
filterwarnings =
    ignore::DeprecationWarning:faiss
    ignore:builtin type Swig:DeprecationWarning
    # Python 3.14+ asyncio deprecation warnings
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning
    ignore:'asyncio.WindowsSelectorEventLoopPolicy' is deprecated:DeprecationWarning
    ignore:'asyncio.set_event_loop_policy' is deprecated:DeprecationWarning
    # LangChain/Pydantic warnings
    ignore:Core Pydantic V1 functionality:UserWarning
    ignore:The 'config' parameter should be typed:UserWarning
