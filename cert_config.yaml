# ============================================================
# 证书管理器配置文件
# Tableau Assistant 生产配置
# ============================================================

# 全局设置
cert_dir: "tableau_assistant/src/infra/certs/store"
verify_ssl: true
warning_days: 30

# ============================================================
# 应用证书配置（用于后端 HTTPS 服务器）
# ============================================================
application:
  # 证书来源: "self-signed"（开发）| "company"（生产）
  source: "self-signed"
  
  # 后端服务器证书（相对于 cert_dir）
  backend:
    cert_file: "app_server.pem"
    key_file: "app_server_key.pem"
  
  ca_bundle: "app_ca.pem"
  
  # 公司证书配置（当 source: "company" 时使用）
  # company:
  #   cert_file: "/path/to/company/server.crt"
  #   key_file: "/path/to/company/server.key"
  #   ca_bundle: "/path/to/company/ca.crt"
  #   auto_fetch: true
  #   fetch_url: "https://cert-server.company.com/api/certs/tableau-assistant"
  #   auto_refresh: true
  #   refresh_interval: 86400

# ============================================================
# 第三方服务证书配置
# ============================================================
services:
  # DeepSeek AI
  deepseek:
    hostname: "api.deepseek.com"
    port: 443
    ca_bundle: "deepseek_full_chain.pem"
    auto_fetch: true
  
  # 智谱 AI
  zhipu-ai:
    hostname: "open.bigmodel.cn"
    port: 443
    ca_bundle: "zhipu_full_chain.pem"
    auto_fetch: true
  
  # Tableau - 智能处理 Cloud 和 Server
  # auto_fetch 选项:
  #   - "auto": 智能检测（Cloud 用系统证书，Server 自动获取）
  #   - true: 强制获取证书
  #   - false: 不获取，使用本地证书
  tableau:
    hostname: "${TABLEAU_DOMAIN}"  # 从环境变量读取，如 https://10ax.online.tableau.com
    port: 443
    ca_bundle: "tableau_cert.pem"
    auto_fetch: "auto"  # 智能模式：Cloud 用系统证书，Server 自动获取
