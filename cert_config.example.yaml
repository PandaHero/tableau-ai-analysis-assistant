# ============================================================
# 证书管理器配置文件示例
# 复制此文件为 cert_config.yaml 并根据你的环境修改
# ============================================================

# 全局设置
cert_dir: "tableau_assistant/src/infra/certs/store"  # 证书存储目录
verify_ssl: true                      # 是否启用 SSL 验证（生产环境建议 true）
warning_days: 30                      # 证书过期前多少天开始警告

# ============================================================
# 应用证书配置（用于后端 HTTPS 服务器）
# ============================================================
application:
  # 证书来源:
  # - "self-signed": 自动生成自签名证书（开发环境）
  # - "company": 使用公司颁发的证书（生产环境）
  source: "self-signed"
  
  # 后端服务器证书（相对于 cert_dir）
  backend:
    cert_file: "app_server.pem"      # 服务器证书文件名
    key_file: "app_server_key.pem"   # 服务器私钥文件名
  
  ca_bundle: "app_ca.pem"            # CA 证书文件名
  
  # 公司证书配置（当 source: "company" 时使用）
  # company:
  #   # 本地路径（手动管理）
  #   cert_file: "/path/to/company/server.crt"
  #   key_file: "/path/to/company/server.key"
  #   ca_bundle: "/path/to/company/ca.crt"
  #   
  #   # 自动拉取配置（可选）
  #   auto_fetch: true
  #   fetch_url: "https://cert-server.company.com/api/certs/tableau-assistant"
  #   # 或使用文件共享: "file:///shared/certs/tableau-assistant"
  #   
  #   # 自动刷新配置（可选）
  #   auto_refresh: true
  #   refresh_interval: 86400  # 刷新间隔（秒），默认 24 小时

# ============================================================
# 第三方服务证书配置
# ============================================================
services:
  # DeepSeek AI 服务
  deepseek:
    hostname: "api.deepseek.com"
    port: 443
    ca_bundle: "deepseek_full_chain.pem"
    auto_fetch: true  # 启动时自动获取证书
  
  # 智谱 AI 服务
  zhipu-ai:
    hostname: "open.bigmodel.cn"
    port: 443
    ca_bundle: "zhipu_full_chain.pem"
    auto_fetch: true
  
  # Tableau - 智能处理 Cloud 和 Server
  # auto_fetch 选项:
  #   - "auto": 智能检测（Cloud 用系统证书，Server 自动获取）
  #   - true: 强制获取证书
  #   - false: 不获取，使用本地证书
  tableau:
    hostname: "${TABLEAU_DOMAIN}"  # 从环境变量读取
    port: 443
    ca_bundle: "tableau_cert.pem"
    auto_fetch: "auto"  # 智能模式
  
  # 自定义服务示例
  # custom-api:
  #   hostname: "api.example.com"
  #   port: 8443
  #   ca_bundle: "custom_api_cert.pem"
  #   auto_fetch: true

# ============================================================
# 环境变量说明
# ============================================================
# 配置文件中可以使用 ${VAR_NAME} 引用环境变量
# 支持默认值: ${VAR_NAME:-default_value}
#
# 常用环境变量:
# - TABLEAU_DOMAIN: Tableau 服务器域名
# - COMPANY_CERT_FILE: 公司证书文件路径
# - COMPANY_KEY_FILE: 公司私钥文件路径
# - COMPANY_CA_BUNDLE: 公司 CA 证书路径
